<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Levi Dự Đoán - Popup Xúc Xắc</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:100vw; height:100vh; overflow:hidden; background:#0a0e1a; font-family:'Segoe UI',sans-serif; }

#game-frame { position:fixed; top:0; left:0; width:100%; height:100%; border:none; z-index:1; }

/* ── WRAPPER ── */
#wrap {
  position: fixed;
  top: 55px; right: 14px;
  z-index: 9999;
}

/* Canvas viền 7 màu — nằm bên ngoài popup */
#bc {
  position: absolute;
  pointer-events: none;
  z-index: 5;
}

/* ── POPUP CHÍNH ── */
#popup {
  position: relative;
  width: 230px;
  background: #0d1e45;
  border-radius: 16px;
  border: 1.5px solid rgba(0,120,255,0.25);
  box-shadow: 0 6px 30px rgba(0,0,0,0.7), inset 0 0 40px rgba(0,30,100,0.3);
  overflow: hidden;
  user-select: none;
  touch-action: none;
  z-index: 4;
}

/* HEADER */
#hdr {
  padding: 7px 12px 6px;
  background: rgba(0,60,160,0.2);
  border-bottom: 1px solid rgba(0,120,255,0.15);
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#hdr:active { cursor: grabbing; }
.htitle { font-size:10px; font-weight:800; letter-spacing:2px; color:#00d4ff; text-shadow:0 0 8px rgba(0,212,255,0.6); }
.htag   { font-size:9px; color:rgba(255,215,0,0.65); font-weight:700; }

/* BODY */
#body { padding: 10px 12px 11px; }

/* Phiên + độ tin cậy */
.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.phien-info { display:flex; flex-direction:column; gap:2px; }
.plabel { font-size:8px; color:rgba(100,180,255,0.4); letter-spacing:1px; }
.pnum   { font-size:14px; font-weight:800; color:#00d4ff; letter-spacing:1px; }

.trust-wrap {
  text-align: right;
}
.trust-label { font-size:7px; color:rgba(0,255,136,0.5); }
.trust-value { font-size:12px; font-weight:800; color:#00ff88; }
.trust-bar-bg {
  width: 70px; height: 3px;
  background: rgba(0,80,200,0.3);
  border-radius: 2px;
  margin-top: 3px;
}
.trust-bar-fill {
  height: 100%;
  background: linear-gradient(90deg,#00ff88,#00d4ff);
  border-radius: 2px;
  width: 0%;
}

/* DỰ ĐOÁN LỚN */
.pred-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(0,20,70,0.5);
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 12px;
}
.pred-label { font-size:10px; color:rgba(200,230,255,0.5); letter-spacing:0.5px; }
#pred-val {
  font-size: 28px; font-weight: 900; letter-spacing: 2px;
  transition: all 0.2s;
}
#pred-val.tai {
  color: #ff6b35;
  text-shadow: 0 0 16px rgba(255,107,53,0.9);
  animation: blinkTai 0.85s ease-in-out infinite;
}
#pred-val.xiu {
  color: #00d4ff;
  text-shadow: 0 0 16px rgba(0,212,255,0.9);
  animation: blinkXiu 0.85s ease-in-out infinite;
}
@keyframes blinkTai  { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
@keyframes blinkXiu  { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

/* Thời gian */
.time-row {
  text-align: center;
  margin-top: 5px;
  font-size: 9px;
  color: rgba(100,180,255,0.5);
  font-family: monospace;
}

/* Nút bấm */
#btn-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: rgba(0,150,255,0.08);
  border: 1px solid rgba(0,150,255,0.2);
  border-radius: 10px;
  padding: 7px 10px;
  margin-top: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
#btn-row:active { transform:scale(0.97); background:rgba(0,150,255,0.15); }
.btn-txt { font-size:10px; font-weight:700; color:rgba(150,210,255,0.7); }
.btn-icon { font-size:13px; }
.btn-main { font-size:11px; font-weight:900; color:#00d4ff; letter-spacing:1px; text-shadow:0 0 8px rgba(0,212,255,0.5); }

/* Hiệu ứng nháy khi thay đổi dự đoán */
.blink-quick {
  animation: quickBlink 0.4s ease-in-out 3;
}
@keyframes quickBlink {
  0% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.96); text-shadow: 0 0 20px currentColor; }
  100% { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<iframe id="game-frame" src="https://web.sunwin.qa" allowfullscreen></iframe>

<div id="wrap">
  <canvas id="bc"></canvas>

  <div id="popup">
    <div id="hdr">
      <span class="htitle">⚡ LEVI PREDICT</span>
      <span class="htag">AI Tài Xỉu</span>
    </div>

    <div id="body">
      <!-- Phiên + Trust -->
      <div class="top-row">
        <div class="phien-info">
          <span class="plabel">PHIÊN</span>
          <span class="pnum" id="pnum">---</span>
        </div>
        <div class="trust-wrap">
          <div class="trust-label">ĐỘ TIN CẬY</div>
          <div class="trust-value" id="trust-val">--%</div>
          <div class="trust-bar-bg"><div class="trust-bar-fill" id="trust-fill"></div></div>
        </div>
      </div>

      <!-- Dự đoán chính -->
      <div class="pred-row">
        <div class="pred-label">🎲 DỰ ĐOÁN</div>
        <div id="pred-val" class="analyzing">---</div>
      </div>

      <!-- Thời gian -->
      <div class="time-row" id="time-text">--:--:--</div>

      <!-- Nút lấy dữ liệu thủ công -->
      <div id="btn-row">
        <span class="btn-txt">AI SCAN</span>
        <span class="btn-icon">🔄</span>
        <span class="btn-main">CẬP NHẬT</span>
      </div>
    </div>
  </div>
</div>

<script>
// ======================== API LEVI ========================
const API_LEVI = 'http://fi12.bot-hosting.cloud:21994/api/levidzai';
const PROXY = 'https://api.codetabs.com/v1/proxy?quest=';

// DOM elements
const pnumEl = document.getElementById('pnum');
const predVal = document.getElementById('pred-val');
const trustVal = document.getElementById('trust-val');
const trustFill = document.getElementById('trust-fill');
const timeText = document.getElementById('time-text');

let lastPrediction = null;     // lưu dự đoán cũ để tạo hiệu ứng nháy
let refreshTimer = null;

// ======================== KÉO THẢ POPUP ========================
(function(){
  const wrap = document.getElementById('wrap');
  const hdr = document.getElementById('hdr');
  let drag = false, sx, sy, ox, oy;

  function getPos(){ const r = wrap.getBoundingClientRect(); return {x: r.left, y: r.top}; }
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function onDown(clientX, clientY){
    drag = true;
    const p = getPos();
    ox = p.x; oy = p.y;
    sx = clientX; sy = clientY;
    wrap.style.transition = 'none';
    hdr.style.cursor = 'grabbing';
  }

  function onMove(clientX, clientY){
    if(!drag) return;
    const left = clamp(ox + (clientX - sx), 0, window.innerWidth - wrap.offsetWidth);
    const top = clamp(oy + (clientY - sy), 0, window.innerHeight - wrap.offsetHeight);
    wrap.style.left = left + 'px';
    wrap.style.top = top + 'px';
    wrap.style.right = 'auto';
    wrap.style.bottom = 'auto';
  }

  function onUp(){
    drag = false;
    hdr.style.cursor = 'grab';
  }

  hdr.addEventListener('mousedown', e => { e.preventDefault(); onDown(e.clientX, e.clientY); });
  document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  document.addEventListener('mouseup', onUp);

  hdr.addEventListener('touchstart', e => { onDown(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
  document.addEventListener('touchmove', e => { if(drag) { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); } }, {passive: false});
  document.addEventListener('touchend', onUp);
})();

// ======================== HIỆU ỨNG NHÁY ========================
function blinkElement(el){
  if(!el) return;
  el.classList.remove('blink-quick');
  void el.offsetWidth;
  el.classList.add('blink-quick');
  setTimeout(() => el.classList.remove('blink-quick'), 500);
}

// ======================== CẬP NHẬT GIAO DIỆN TỪ API ========================
function updateUI(data){
  // Cập nhật phiên
  if(data.phien != null){
    pnumEl.textContent = '#' + (Number(data.phien) + 1);
  }

  // Cập nhật độ tin cậy
  if(data.do_tin_cay != null){
    let tc = parseInt(data.do_tin_cay);
    if(isNaN(tc)) tc = 0;
    tc = Math.min(100, Math.max(0, tc));
    trustVal.textContent = tc + '%';
    trustFill.style.width = tc + '%';
  }

  // Cập nhật thời gian
  if(data.thoi_gian){
    timeText.textContent = data.thoi_gian;
  }

  // Xử lý dự đoán Tài/Xỉu + hiệu ứng nháy
  if(data.du_doan){
    let newPred = String(data.du_doan).toLowerCase();
    let newDisplay = (newPred === 'tai') ? 'TÀI' : (newPred === 'xiu') ? 'XỈU' : '---';
    let currentDisplay = predVal.textContent;

    // Nếu thay đổi -> nháy
    if(currentDisplay !== newDisplay && newDisplay !== '---'){
      blinkElement(predVal);
    }

    predVal.textContent = newDisplay;
    // Cập nhật class để có màu + animation nhấp nháy liên tục
    predVal.classList.remove('tai', 'xiu', 'analyzing');
    if(newPred === 'tai'){
      predVal.classList.add('tai');
    } else if(newPred === 'xiu'){
      predVal.classList.add('xiu');
    } else {
      predVal.classList.add('analyzing');
    }
    lastPrediction = newPred;
  } else {
    predVal.textContent = '---';
    predVal.classList.remove('tai', 'xiu');
    predVal.classList.add('analyzing');
  }
}

// ======================== FETCH API (có fallback proxy) ========================
async function fetchLeviData(){
  try {
    // Thử qua proxy tránh CORS
    const res = await fetch(PROXY + encodeURIComponent(API_LEVI));
    if(res.ok){
      const json = await res.json();
      if(json && json.success !== false){
        updateUI(json);
        return;
      }
    }
    throw new Error('Proxy fail');
  } catch(e){
    try {
      // Fallback direct (có thể bị CORS nhưng vẫn thử)
      const direct = await fetch(API_LEVI, { mode: 'cors', cache: 'no-store' });
      if(direct.ok){
        const json = await direct.json();
        if(json && json.success !== false){
          updateUI(json);
          return;
        }
      }
      throw new Error('Direct fail');
    } catch(err){
      console.warn('Lỗi lấy dữ liệu Levi:', err);
      // Không cập nhật gì thêm, giữ nguyên UI cũ
    }
  }
}

// ======================== AUTO REFRESH ========================
function startAutoRefresh(){
  fetchLeviData();
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchLeviData, 5000);
}

// Nút bấm thủ công
document.getElementById('btn-row').addEventListener('click', () => {
  fetchLeviData();
  // thêm hiệu ứng nhấn nút
  const btn = document.getElementById('btn-row');
  btn.style.transform = 'scale(0.97)';
  setTimeout(() => btn.style.transform = '', 150);
});

// ======================== CANVAS VIỀN 7 MÀU CHẠY DẦN (giữ nguyên từ file cũ) ========================
(function(){
  const popup = document.getElementById('popup');
  const cv = document.getElementById('bc');
  const ctx = cv.getContext('2d');

  const COLORS = ['#ff0000','#ff7700','#ffee00','#00ff55','#00ccff','#5566ff','#cc00ff'];
  const PAD = 3, R = 16, SPEED = 0.004;
  const REACH = 0.38;
  let offset = 0;

  function resize(){
    const W = popup.offsetWidth + PAD*2 + 2;
    const H = popup.offsetHeight + PAD*2 + 2;
    cv.width = W; cv.height = H;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    cv.style.top = -(PAD+1) + 'px';
    cv.style.left = -(PAD+1) + 'px';
  }

  function hexRgb(h){
    const v = parseInt(h.slice(1),16);
    return [(v>>16)&255, (v>>8)&255, v&255];
  }
  function lerpCol(a,b,t){
    const [r1,g1,b1] = hexRgb(a), [r2,g2,b2] = hexRgb(b);
    return [Math.round(r1+(r2-r1)*t), Math.round(g1+(g2-g1)*t), Math.round(b1+(b2-b1)*t)];
  }
  function colorAt(t){
    t = ((t%1)+1)%1;
    const n = COLORS.length, i = Math.floor(t*n), f = t*n - i;
    const [r,g,b] = lerpCol(COLORS[i%n], COLORS[(i+1)%n], f);
    return {r,g,b};
  }

  function buildPerimeter(x,y,w,h,r,N){
    const pts = [];
    const segs = [
      {arc:true, cx:x+w-r, cy:y+r,   r, a0:-Math.PI/2, a1:0},
      {arc:false,x0:x+w,   y0:y+r,   x1:x+w, y1:y+h-r},
      {arc:true, cx:x+w-r, cy:y+h-r, r, a0:0,          a1:Math.PI/2},
      {arc:false,x0:x+w-r, y0:y+h,   x1:x+r,   y1:y+h},
      {arc:true, cx:x+r,   cy:y+h-r, r, a0:Math.PI/2,  a1:Math.PI},
      {arc:false,x0:x,     y0:y+h-r, x1:x,     y1:y+r},
      {arc:true, cx:x+r,   cy:y+r,   r, a0:Math.PI,    a1:Math.PI*1.5},
      {arc:false,x0:x+r,   y0:y,     x1:x+w-r, y1:y},
    ];
    const lens = segs.map(s => s.arc ? r*Math.abs(s.a1-s.a0) : Math.hypot(s.x1-s.x0, s.y1-s.y0));
    const total = lens.reduce((a,b)=>a+b,0);
    for(let i=0;i<N;i++){
      let d = (i/N)*total, frac = i/N;
      for(let si=0; si<segs.length; si++){
        if(d <= lens[si]+1e-9){
          const s = segs[si], t = lens[si]>0 ? Math.min(d/lens[si],1) : 0;
          if(s.arc){
            const a = s.a0 + (s.a1-s.a0)*t;
            pts.push({x:s.cx + Math.cos(a)*s.r, y:s.cy + Math.sin(a)*s.r, f:frac});
          } else {
            pts.push({x:s.x0 + (s.x1-s.x0)*t, y:s.y0 + (s.y1-s.y0)*t, f:frac});
          }
          break;
        }
        d -= lens[si];
      }
    }
    return pts;
  }

  let pts = [];
  function rebuildPts(){
    const p = PAD+1;
    pts = buildPerimeter(p-0.5, p-0.5, popup.offsetWidth+1, popup.offsetHeight+1, R, 500);
  }

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    if(!pts.length){ requestAnimationFrame(draw); return; }
    const N = pts.length;
    ctx.save();
    ctx.lineCap = 'round';
    for(let i=0;i<N;i++){
      const p1 = pts[i], p2 = pts[(i+1)%N];
      const f = p1.f;
      const distCW  = f;
      const distCCW = 1-f;
      const dist = Math.min(distCW, distCCW);
      if(dist > REACH) continue;
      const fade = 1 - dist/REACH;
      const alpha = Math.pow(fade, 1.4);
      const lw = 2.5 * fade + 0.3;
      const colorFrac = ((f + offset)%1+1)%1;
      const {r,g,b} = colorAt(colorFrac);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineWidth = lw;
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.stroke();
    }
    ctx.restore();
    offset = (offset + SPEED) % 1;
    requestAnimationFrame(draw);
  }

  resize(); rebuildPts();
  new ResizeObserver(()=>{ resize(); rebuildPts(); }).observe(popup);
  draw();
})();

// Khởi chạy
startAutoRefresh();

// Nếu người dùng nhấp đúp vào popup cũng refresh
document.getElementById('popup').addEventListener('dblclick', () => fetchLeviData());

// Dọn dẹp interval khi rời trang (tuỳ chọn)
window.addEventListener('beforeunload', () => {
  if(refreshTimer) clearInterval(refreshTimer);
});
</script>
</body>
</html>
