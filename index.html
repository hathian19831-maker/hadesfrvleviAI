<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Website Đang Bảo Trì</title>
    <style>
        /* Reset margin/padding để căn giữa hoàn hảo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Thiết lập body chiếm toàn bộ viewport */
        body {
            min-height: 100vh;           /* Chiều cao tối thiểu bằng màn hình */
            display: flex;               /* Bật Flexbox */
            align-items: center;         /* Căn giữa theo chiều dọc */
            justify-content: center;     /* Căn giữa theo chiều ngang */
            text-align: center;          /* Đảm bảo chữ nằm giữa nếu xuống dòng */
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 1rem;
        }

        /* Phần chứa nội dung chính - có thể thêm hiệu ứng nhẹ */
        .maintenance-message {
            max-width: 90%;
            width: 100%;
        }

        /* Định dạng cho dòng chữ chính */
        .maintenance-text {
            font-size: clamp(1.8rem, 8vw, 3.5rem);  /* Đáp ứng mọi màn hình */
            font-weight: 700;
            color: #1e2a3e;
            letter-spacing: -0.02em;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 1.2rem 2rem;
            border-radius: 64px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.8);
            display: inline-block;   /* Giúp background vừa với nội dung */
            line-height: 1.3;
        }

        /* Hiệu ứng nhẹ khi hover (tăng tương tác) */
        .maintenance-text:hover {
            background: rgba(255, 255, 255, 0.8);
            transition: background 0.2s ease;
        }

        /* Tuỳ chọn: thêm icon hoặc dấu chấm động để sinh động (không bắt buộc) */
        .maintenance-message::before {
            content: "🔧";
            font-size: 3rem;
            display: block;
            margin-bottom: 0.75rem;
            opacity: 0.7;
        }

        /* Phụ: giữ chữ luôn đẹp trên mobile */
        @media (max-width: 640px) {
            .maintenance-text {
                padding: 1rem 1.5rem;
                border-radius: 48px;
            }
            .maintenance-message::before {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-message">
        <div class="maintenance-text">
            Website Bảo Trì Để Nâng Cấp...
        </div>
    </div>
</body>
</html>
